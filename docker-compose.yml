services:
  app:
    build: .
    container_name: lecturelib_app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-demo-key}
      DEBUG: ${DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn projectConfig.wsgi:application --bind 0.0.0.0:8000"
