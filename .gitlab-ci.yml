stages:
  - deploy

deploy-production:
  stage: deploy
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - test -n "$ENV_FILE"
    - test -f "$ENV_FILE"
    - docker compose --env-file "$ENV_FILE" config --quiet
  script:
    - docker compose --env-file "$ENV_FILE" build
    - docker compose --env-file "$ENV_FILE" up -d --remove-orphans
    - docker compose --env-file "$ENV_FILE" ps
